<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberGamer | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark text-light d-flex flex-column min-vh-100">

    <nav class="navbar navbar-dark bg-black border-bottom border-purple">
        <div class="container">
            <a class="navbar-brand fw-bold text-purple" href="index.html">CYBER<span class="text-white">GAMER</span></a>
            <a class="btn btn-outline-light btn-sm" href="index.html">Voltar para Home</a>
        </div>
    </nav>

    <main class="container my-auto d-flex justify-content-center py-5">
        <div class="card bg-black border-purple text-light p-4 shadow-lg style-login-card">
            <h3 class="text-center mb-4 text-purple">Área do Cliente Gamer</h3>
            
            <!-- Caixa de Alerta para mensagens do JS -->
            <div id="login-alert" class="alert d-none" role="alert"></div>

            <form id="form-login">
                <div class="mb-3">
                    <label for="email" class="form-label">E-mail ou Usuário</label>
                    <input type="email" class="form-content form-control bg-dark text-light border-secondary" id="email" required placeholder="seuemail@gamer.com">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Senha Secreta</label>
                    <input type="password" class="form-content form-control bg-dark text-light border-secondary" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-purple w-100 fw-bold mt-2">Entrar no Sistema</button>
            </form>
        </div>
    </main>

    <footer class="bg-black text-center py-3 border-top border-purple text-secondary mt-auto">
        <p class="mb-0">&copy; 2026 CYBERGAMER</p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
